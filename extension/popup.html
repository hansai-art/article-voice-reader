<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, system-ui, sans-serif; background: #fafaf8; color: #1e293b; }
    .header { padding: 16px; background: #3b82f6; color: white; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .content { padding: 16px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary { background: #f1f5f9; color: #475569; margin-top: 8px; }
    .btn-secondary:hover { background: #e2e8f0; }
    .status { font-size: 12px; color: #64748b; margin-top: 12px; text-align: center; min-height: 18px; }
    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }
    .preview { margin-top: 12px; padding: 10px; background: #f1f5f9; border-radius: 8px; font-size: 12px; color: #475569; max-height: 80px; overflow: hidden; line-height: 1.5; }
    .settings { margin-top: 12px; }
    .settings label { font-size: 12px; color: #64748b; display: block; margin-bottom: 4px; }
    .settings input { width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📖 語音朗讀器</h1>
    <p>Article Voice Reader</p>
  </div>
  <div class="content">
    <button class="btn btn-primary" id="sendBtn">📤 朗讀這篇文章</button>
    <button class="btn btn-secondary" id="selectBtn">✂️ 朗讀選取的文字</button>
    <div class="status" id="status"></div>
    <div class="preview" id="preview" style="display:none;"></div>
    <div class="settings">
      <label>朗讀器網址 (Reader URL)</label>
      <input type="text" id="readerUrl" placeholder="https://your-app.lovable.app">
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
